{% extends 'base.html' %}
{% load static %}
{% block title %}Delete Confirmation - Music App{% endblock %}

{% block contents %}
<div style="max-width: 500px; margin: 5rem auto; padding: 3rem 2rem; background: var(--glass-bg); border-radius: 20px; border: 1px solid var(--glass-border); backdrop-filter: blur(10px); text-align: center;">
    <div style="width: 80px; height: 80px; background: rgba(231, 76, 60, 0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem; border: 2px solid rgba(231, 76, 60, 0.3);">
        <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" fill="#e74c3c" viewBox="0 0 16 16">
            <path d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14zm0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16z"/>
            <path d="M7.002 11a1 1 0 1 1 2 0 1 1 0 0 1-2 0zM7.1 4.995a.905.905 0 1 1 1.8 0l-.35 3.507a.552.552 0 0 1-1.1 0L7.1 4.995z"/>
        </svg>
    </div>

    <h2 style="font-size: 1.8rem; font-weight: 700; color: var(--text-light); margin-bottom: 1rem;">Are you sure?</h2>
    <p style="color: var(--text-muted); margin-bottom: 2.5rem; line-height: 1.6;">
        この音楽投稿を削除すると、元に戻すことはできません。<br>
        本当に削除してもよろしいですか？
    </p>

    <form method="POST" style="display: flex; gap: 1rem; justify-content: center;">
        {% csrf_token %}
        <button type="submit" class="btn-view" style="background: #e74c3c; border: none; flex: 1; padding: 0.8rem;">
            Delete
        </button>
        <a href="{% url 'musicapp:photo_detail' object.id %}" class="btn-view" style="background: transparent; border: 1px solid var(--glass-border); flex: 1; padding: 0.8rem; text-decoration: none;">
            Cancel
        </a>
    </form>
</div>
{% endblock %}
