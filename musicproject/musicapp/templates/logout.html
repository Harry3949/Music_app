{% extends "base.html" %}
{% load static %}
{% block title %}Logged Out - Music App{% endblock %}

{% block contents %}
<div style="max-width: 500px; margin: 6rem auto; padding: 3rem 2rem; background: var(--glass-bg); border-radius: 20px; border: 1px solid var(--glass-border); backdrop-filter: blur(10px); text-align: center;">
    <div style="width: 80px; height: 80px; background: rgba(108, 92, 231, 0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem; border: 2px solid rgba(108, 92, 231, 0.3);">
        <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" fill="#a29bfe" viewBox="0 0 16 16">
            <path d="M8 8a3 3 0 1 0 0-6 3 3 0 0 0 0 6zm2-3a2 2 0 1 1-4 0 2 2 0 0 1 4 0zm4 8c0 1-1 1-1 1H3s-1 0-1-1 1-4 6-4 6 3 6 4zm-1-.004c-.001-.246-.154-.986-.832-1.664C11.516 10.68 10.289 10 8 10c-2.29 0-3.516.68-4.168 1.332-.678.678-.83 1.418-.832 1.664h10z"/>
        </svg>
    </div>

    <h2 style="font-size: 1.8rem; font-weight: 700; color: var(--text-light); margin-bottom: 1rem;">
        ログアウトしました
    </h2>
    <p style="color: var(--text-muted); margin-bottom: 2.5rem; line-height: 1.6;">
        またのご利用をお待ちしています。<br>
        引き続き音楽を楽しんでください。
    </p>

    <div style="display: flex; flex-direction: column; gap: 1rem;">
        <a href="{% url 'musicapp:index' %}" class="btn-view" style="width: 100%; border: none;">
            Top Page
        </a>
        <a href="{% url 'accounts:login' %}" class="btn-view" style="background: transparent; border: 1px solid var(--glass-border); text-decoration: none;">
            Log In Again
        </a>
    </div>
</div>
{% endblock %}
