{% load static %}

<div class="album-container">
    {% for record in page_obj %}
    <div class="music-card">
        <div class="card-image-wrapper">
            {% if record.image %}
                <img src="{{ record.image.url }}" alt="{{ record.title }}">
            {% else %}
                <div style="background: var(--glass-bg); display: flex; align-items: center; justify-content: center; height: 100%;">
                    <span style="color: var(--text-muted);">No Image</span>
                </div>
            {% endif %}
        </div>
        <div class="card-content">
            <h3 class="card-title">{{ record.title }}</h3>
            <p class="card-author">
                by <a href="{% url 'musicapp:user_list' user=record.user.id %}" style="color: var(--secondary-color); text-decoration: none;">{{ record.user.username }}</a>
            </p>
            <div class="d-flex justify-content-between align-items-center">
                <a href="{% url 'musicapp:photo_detail' record.pk %}" class="btn-view">View Detail</a>
                
                <div class="like-section" style="display: flex; align-items: center; gap: 0.5rem;">
                    <button class="like-btn" data-id="{{ record.pk }}" style="background: none; border: none; cursor: pointer; color: {% if user in record.likes.all %}#e74c3c{% else %}var(--text-muted){% endif %}; transition: transform 0.2s;">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16">
                            <path d="M8 1.314C12.438-3.248 23.534 4.735 8 15-7.534 4.736 3.562-3.248 8 1.314z"/>
                        </svg>
                    </button>
                    <span class="like-count" data-id="{{ record.pk }}" style="font-size: 0.9rem; color: var(--text-muted);">{{ record.total_likes }}</span>
                </div>

                <small style="color: var(--text-muted); font-size: 0.75rem;">{{ record.posted_at|date:"Y/m/d" }}</small>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
