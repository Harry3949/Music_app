<div style="text-align: center; padding: 4rem 2rem; background: var(--glass-bg); border-radius: 20px; border: 1px solid var(--glass-border); backdrop-filter: blur(10px); margin-bottom: 3rem;">
    <h1 style="font-size: 3rem; font-weight: 700; margin-bottom: 1rem; background: linear-gradient(to right, #6c5ce7, #a29bfe); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
        Music App
    </h1>
    <p style="font-size: 1.2rem; color: var(--text-muted); margin-bottom: 2rem; max-width: 600px; margin-left: auto; margin-right: auto;">
        あなたのサウンドを世界へ。オリジナル曲を高音質で共有し、新しい音楽との出会いを楽しもう。
    </p>
    
    <div>
        {% if user.is_authenticated %}
            <a href="{% url 'musicapp:post' %}" class="btn-view" style="padding: 1rem 2rem; font-size: 1rem;">曲を投稿する</a>
            <a href="{% url 'musicapp:mypage' %}" class="btn-view" style="padding: 1rem 2rem; font-size: 1rem; background: transparent; border: 1px solid var(--glass-border); margin-left: 1rem;">マイページ</a>
        {% else %}
            <a href="{% url 'accounts:signup' %}" class="btn-view" style="padding: 1rem 2rem; font-size: 1rem;">今すぐ始める</a>
            <a href="{% url 'accounts:login' %}" class="btn-view" style="padding: 1rem 2rem; font-size: 1rem; background: transparent; border: 1px solid var(--glass-border); margin-left: 1rem;">ログイン</a>
        {% endif %}
    </div>
</div>
