<div style="display: flex; justify-content: center; margin-top: 3rem; gap: 0.5rem;">
    {% if page_obj.has_previous %}
    <a href="?page={{ page_obj.previous_page_number }}{% if request.GET.search %}&search={{ request.GET.search }}{% endif %}" 
       style="padding: 0.5rem 1rem; background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 10px; color: var(--text-light); text-decoration: none; transition: 0.3s;">
       &laquo; Prev
    </a>
    {% endif %}

    {% for num in page_obj.paginator.page_range %}
        {% if page_obj.number == num %}
        <span style="padding: 0.5rem 1rem; background: var(--primary-color); border: 1px solid var(--primary-color); border-radius: 10px; color: white;">
            {{ num }}
        </span>
        {% else %}
        <a href="?page={{ num }}{% if request.GET.search %}&search={{ request.GET.search }}{% endif %}" 
           style="padding: 0.5rem 1rem; background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 10px; color: var(--text-light); text-decoration: none; transition: 0.3s;">
           {{ num }}
        </a>
        {% endif %}
    {% endfor %}

    {% if page_obj.has_next %}
    <a href="?page={{ page_obj.next_page_number }}{% if request.GET.search %}&search={{ request.GET.search }}{% endif %}" 
       style="padding: 0.5rem 1rem; background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 10px; color: var(--text-light); text-decoration: none; transition: 0.3s;">
       Next &raquo;
    </a>
    {% endif %}
</div>
