{% extends "base.html" %}
{% load static %}
{% block title %}Reset Password{% endblock %}

    {% block contents %}
    <style>
        body {
            background-image: url("{% static 'image/IMG_1298.jpeg' %}");
            background-size: cover;
            background-repeat: no-repeat;
        }
    </style>
    <div class="container">
        <div class="row">
            <div class="col py-4">
                <hr>
                <h3>パスワードをリセットしますか？</h3>
                <p>登録済みのメールアドレスを入力してください。
                    パスワードリセットのリンクを記載したメールをお届けします。
                </p>
                <br>
                <form action="" method="POST" class="text-center">
                    {% csrf_token %}
                    {{form}}
                    <input type="submit" value="メールを受け取る"></br>
                </form>
                </br>
                <a href="{% url 'musicapp:index' %}">音楽投稿サイト</a>
                <hr>
            </div>
        </div>
    </div>
    {% endblock %}
