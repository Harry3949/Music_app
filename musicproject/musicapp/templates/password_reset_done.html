{% extends "base.html" %}
{% load static %}
{% block title %}Password Reset Complete - Music App{% endblock %}

{% block contents %}
<div style="max-width: 500px; margin: 6rem auto; padding: 3rem 2rem; background: var(--glass-bg); border-radius: 20px; border: 1px solid var(--glass-border); backdrop-filter: blur(10px); text-align: center;">
    <div style="width: 80px; height: 80px; background: rgba(46, 204, 113, 0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem; border: 2px solid rgba(46, 204, 113, 0.3);">
        <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" fill="#2ecc71" viewBox="0 0 16 16">
            <path d="M12.736 3.97a.733.733 0 0 1 1.047 0c.286.289.29.756.01 1.05L7.88 12.01a.733.733 0 0 1-1.065.02L3.217 8.384a.757.757 0 0 1 0-1.06.733.733 0 0 1 1.047 0l3.052 3.093 5.42-5.447a.31.31 0 0 1 .012-.022z"/>
        </svg>
    </div>

    <h2 style="font-size: 1.8rem; font-weight: 700; color: var(--text-light); margin-bottom: 1rem;">
        リセットが完了しました
    </h2>
    <p style="color: var(--text-muted); margin-bottom: 2.5rem; line-height: 1.6;">
        パスワードの変更が正常に完了しました。<br>
        新しいパスワードでログインしてください。
    </p>

    <div style="display: flex; flex-direction: column; gap: 1rem;">
        <a href="{% url 'accounts:login' %}" class="btn-view" style="width: 100%; border: none;">
            Log In Now
        </a>
    </div>
</div>
{% endblock %}
