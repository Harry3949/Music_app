{% extends "base.html" %}
{% load static %}
{% block title %}Email Sent - Music App{% endblock %}

{% block contents %}
<div style="max-width: 500px; margin: 6rem auto; padding: 3rem 2rem; background: var(--glass-bg); border-radius: 20px; border: 1px solid var(--glass-border); backdrop-filter: blur(10px); text-align: center;">
    <div style="width: 80px; height: 80px; background: rgba(108, 92, 231, 0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem; border: 2px solid rgba(108, 92, 231, 0.3);">
        <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" fill="#a29bfe" viewBox="0 0 16 16">
            <path d="M15.854.146a.5.5 0 0 1 .11.54l-5.819 14.547a.75.75 ..."/>
            <path d="M0 4a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V4zm2-1a1 1 0 0 0-1 1v.217l7 4.2 7-4.2V4a1 1 0 0 0-1-1H2zm13 2.383-4.708 2.825L15 11.105V5.383zm-.034 6.876-5.64-3.471L8 9.583l-1.326-.795-5.64 3.47A1 1 0 0 0 2 13h12a1 1 0 0 0 .966-.741zM1 11.105l4.708-2.897L1 5.383v5.722z"/>
        </svg>
    </div>

    <h2 style="font-size: 1.8rem; font-weight: 700; color: var(--text-light); margin-bottom: 1rem;">
        メールを送信しました
    </h2>
    <p style="color: var(--text-muted); margin-bottom: 2.5rem; line-height: 1.6;">
        パスワードリセット用のリンクをご指定のメールアドレスに送信しました。<br>
        メールボックスを確認し、指示に従って手続きを完了してください。
    </p>

    <div style="display: flex; flex-direction: column; gap: 1rem;">
        <a href="{% url 'accounts:login' %}" class="btn-view" style="width: 100%; border: none;">
            Return to Login
        </a>
    </div>
</div>
{% endblock %}
